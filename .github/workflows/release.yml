name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Upload artifacts to release
        run: gh release upload ${{ github.ref_name }} dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
